ontology:
  metadata:
    versionIRI: https://pid.astrazeneca.net/ontology/app/mia/1.0
    imports: https://pid.astrazeneca.net/ref-ops/
    abstract: Defines manufacturing entities, processes, and relationships for pharmaceutical operations and supply chain
      management.
    contributor: Gen AI Manufacturing Insight Agent Development
    created: '2025-09-05'
    creator: Manufacturing Insight Agent Development Team
    description: |-
      A comprehensive ontology for manufacturing data integration, enabling semantic reasoning across batch processing, equipment management, and operational workflows in pharmaceutical manufacturing environments.
    language: en
    license: https://creativecommons.org/licenses/by/4.0/
    maintainer: Manufacturing Ontology Team
    modified: '2025-09-05'
    subject: Manufacturing, Batch Processing, Process Orders, Semantic Reasoning
    title: Manufacturing Insight Agent Ontology (MIA)
    version: '1.0'
    comment: |-
      Production-ready v1.0 ontology supporting the Gen AI Manufacturing Insight Agent with comprehensive semantic modeling of pharmaceutical manufacturing operations, batch processing, and quality management workflows.
    label: Manufacturing Insight Agent Ontology
    versionInfo: '1.0'
    changeNote: |-
      v1.0 (2025-09-05): Production release consolidating all development iterations with stable class hierarchy, refined property domains/ranges, and comprehensive manufacturing workflow coverage.
  prefixes:
    mia: https://pid.astrazeneca.net/ontology/app/mia/
    def-ops: https://pid.astrazeneca.net/def-ops/
    ref-ops: https://pid.astrazeneca.net/ref-ops/
    skos: http://www.w3.org/2004/02/skos/core#
    owl: http://www.w3.org/2002/07/owl#
    rdfs: http://www.w3.org/2000/01/rdf-schema#
    xsd: http://www.w3.org/2001/XMLSchema#
    dcterms: http://purl.org/dc/terms/
  datatypes:
  - rdf:PlainLiteral
  - xsd:boolean
  - xsd:date
  - xsd:dateTime
  - xsd:dateTimeStamp
  - xsd:decimal
  - xsd:integer
  - xsd:string
  annotation_properties:
  - dcterms:abstract
  - dcterms:contributor
  - dcterms:created
  - dcterms:creator
  - dcterms:description
  - dcterms:language
  - dcterms:license
  - dcterms:maintainer
  - dcterms:modified
  - dcterms:references
  - dcterms:subject
  - dcterms:title
  - dcterms:version
  - rdfs:comment
  - rdfs:label
  - skos:changeNote
  - skos:definition
  - skos:inScheme
  - skos:prefLabel
  classes:
    def-ops:Area:
      uri: https://pid.astrazeneca.net/def-ops/Area
      subClassOf: def-ops:Site
    def-ops:Batch:
      uri: https://pid.astrazeneca.net/def-ops/Batch
    def-ops:Enterprise:
      uri: https://pid.astrazeneca.net/def-ops/Enterprise
    def-ops:Lot:
      uri: https://pid.astrazeneca.net/def-ops/Lot
    def-ops:Material:
      uri: https://pid.astrazeneca.net/def-ops/Material
    def-ops:Operation:
      uri: https://pid.astrazeneca.net/def-ops/Operation
    def-ops:Order:
      uri: https://pid.astrazeneca.net/def-ops/Order
    def-ops:Site:
      uri: https://pid.astrazeneca.net/def-ops/Site
      subClassOf: def-ops:Enterprise
    mia:PlannedOrder:
      uri: https://pid.astrazeneca.net/ontology/app/mia/PlannedOrder
      label: Planned Order
      description: |-
        A planned production order that exists in the planning phase before being converted to a process order. Planned orders are used for material requirements planning and capacity planning.
      references: Order Status Data Product
      subClassOf: def-ops:Order
    mia:ProcessOrder:
      uri: https://pid.astrazeneca.net/ontology/app/mia/ProcessOrder
      label: Process Order
      description: |-
        An individual process or production order executed at manufacturing sites. Identity: processOrderNumber + productionPlantCode uniquely identifies instances across all SAP systems.
      references: Order Status Data Product
      subClassOf: def-ops:Order
    mia:ProcessOrderOperation:
      uri: https://pid.astrazeneca.net/ontology/app/mia/ProcessOrderOperation
      label: Process Order Operation
      description: |-
        Individual operations or steps within a process order. Each operation represents a specific manufacturing activity with its own timing, resources, and status tracking.
      references: Order Status Data Product - Operations
      subClassOf: def-ops:Operation
    mia:QualityEvent:
      uri: https://pid.astrazeneca.net/ontology/app/mia/QualityEvent
      label: Quality Event
      description: |-
        Quality events affecting batches. Populated from qualityEventIdentifiersText, qualityEventTypeCodesText properties in existing tables.
    mia:QualityNotification:
      uri: https://pid.astrazeneca.net/ontology/app/mia/QualityNotification
      label: Quality Notification
      description: |-
        A formal notification regarding quality issues, deviations, or concerns in manufacturing processes. Quality notifications trigger investigations and corrective actions to maintain product quality and compliance.
      references: Quality Notifications Data Product
    skos:Concept:
      uri: http://www.w3.org/2004/02/skos/core#Concept
      label: Concept
    skos:ConceptScheme:
      uri: http://www.w3.org/2004/02/skos/core#ConceptScheme
      label: Concept Scheme
  object_properties:
    def-ops:consumes:
      uri: https://pid.astrazeneca.net/def-ops/consumes
      label: consumes
      description: Order → Batch consumption edge; cardinalities and value-sets enforced in SHACL.
      domain: mia:ProcessOrder

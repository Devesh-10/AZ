      - mia:ProcessOrder
      range: skos:Concept
    mia:hasQualityEvent:
      uri: https://pid.astrazeneca.net/ontology/app/mia/hasQualityEvent
      label: has quality event
      description: Binds a batch to its related quality events; no direct Lot or Order links in scope.
      domain: def-ops:Batch
      range: mia:QualityEvent
    mia:hasQualityNotification:
      uri: https://pid.astrazeneca.net/ontology/app/mia/hasQualityNotification

    def-ops:hasOrderStatus:
      uri: https://pid.astrazeneca.net/def-ops/hasOrderStatus
      label: has order status
      description: Links process order to a status concept; values constrained to ref-ops:OrderStatusScheme in SHACL.
      domain: mia:ProcessOrder
      range: skos:Concept
    def-ops:produces:
      uri: https://pid.astrazeneca.net/def-ops/produces
      label: produces

version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - npm ci
      - npm run build
run:
  command: npm start
  network:
    port: 3001
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "3001"
    - name: AWS_REGION
      value: us-east-1
    - name: BEDROCK_MODEL_ID
      value: us.anthropic.claude-3-5-sonnet-20241022-v2:0

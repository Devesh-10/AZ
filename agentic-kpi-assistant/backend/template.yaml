AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Agentic KPI Assistant API

Globals:
  Function:
    Timeout: 90
    MemorySize: 1024
    Runtime: nodejs20.x

Resources:
  KpiApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: agentic-kpi-api
      Handler: dist/lambda.handler
      CodeUri: .
      Environment:
        Variables:
          NODE_ENV: production
          AWS_REGION_NAME: us-east-1
          BEDROCK_MODEL_ID: us.anthropic.claude-3-5-sonnet-20241022-v2:0
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref KpiApi
        Root:
          Type: Api
          Properties:
            Path: /
            Method: ANY
            RestApiId: !Ref KpiApi

  KpiApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: agentic-kpi-api
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${KpiApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
